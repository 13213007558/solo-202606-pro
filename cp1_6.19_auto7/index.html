<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>分子结构可视化编辑器</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
      background: #10141E;
      color: #ffffff;
    }

    #app {
      width: 100%;
      height: 100%;
      display: flex;
      position: relative;
    }

    #sidebar {
      width: 320px;
      height: 100%;
      background: rgba(16, 20, 30, 0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-right: 1px solid rgba(0, 212, 255, 0.15);
      padding: 24px 16px;
      flex-shrink: 0;
      transition: width 0.3s ease;
      z-index: 100;
      overflow-y: auto;
    }

    #sidebar.hidden {
      width: 0;
      padding: 0;
      overflow: hidden;
      border-right: none;
    }

    .sidebar-title {
      font-size: 20px;
      font-weight: 600;
      color: #00D4FF;
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .sidebar-title::before {
      content: '';
      width: 4px;
      height: 24px;
      background: linear-gradient(180deg, #00D4FF, #0099CC);
      border-radius: 2px;
    }

    .molecule-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .molecule-item {
      padding: 14px 16px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .molecule-item:hover {
      background: rgba(0, 212, 255, 0.08);
      border-color: rgba(0, 212, 255, 0.3);
      transform: translateX(4px);
    }

    .molecule-item.active {
      background: rgba(0, 212, 255, 0.12);
      border-color: #00D4FF;
      box-shadow: 0 0 20px rgba(0, 212, 255, 0.15);
    }

    .molecule-icon {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 12px;
      background: linear-gradient(135deg, rgba(0, 212, 255, 0.2), rgba(0, 153, 204, 0.2));
      color: #00D4FF;
      flex-shrink: 0;
    }

    .molecule-info {
      display: flex;
      flex-direction: column;
      gap: 2px;
      flex: 1;
      min-width: 0;
    }

    .molecule-name {
      font-size: 15px;
      font-weight: 500;
      color: #ffffff;
    }

    .molecule-formula {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.5);
    }

    #viewport {
      flex: 1;
      position: relative;
      overflow: hidden;
    }

    #canvas-container {
      width: 100%;
      height: 100%;
    }

    #fps-counter {
      position: absolute;
      right: 16px;
      bottom: 16px;
      padding: 6px 12px;
      background: rgba(16, 20, 30, 0.6);
      backdrop-filter: blur(8px);
      border-radius: 6px;
      font-size: 12px;
      color: rgba(255, 255, 255, 0.8);
      font-family: 'Courier New', monospace;
      pointer-events: none;
      z-index: 10;
    }

    #menu-toggle {
      display: none;
      position: absolute;
      top: 16px;
      left: 16px;
      width: 44px;
      height: 44px;
      background: rgba(16, 20, 30, 0.85);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(0, 212, 255, 0.2);
      border-radius: 10px;
      cursor: pointer;
      z-index: 200;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
    }

    #menu-toggle:hover {
      border-color: #00D4FF;
      box-shadow: 0 0 15px rgba(0, 212, 255, 0.2);
    }

    #menu-toggle span {
      display: block;
      width: 20px;
      height: 2px;
      background: #00D4FF;
      position: relative;
    }

    #menu-toggle span::before,
    #menu-toggle span::after {
      content: '';
      position: absolute;
      width: 20px;
      height: 2px;
      background: #00D4FF;
      left: 0;
    }

    #menu-toggle span::before { top: -6px; }
    #menu-toggle span::after { top: 6px; }

    .tooltip {
      position: absolute;
      top: 16px;
      right: 16px;
      padding: 12px 16px;
      background: rgba(16, 20, 30, 0.85);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(0, 212, 255, 0.15);
      border-radius: 10px;
      font-size: 12px;
      color: rgba(255, 255, 255, 0.7);
      max-width: 260px;
      line-height: 1.6;
      z-index: 10;
    }

    .tooltip strong {
      color: #00D4FF;
    }

    @media (max-width: 768px) {
      #app {
        flex-direction: column;
      }

      #sidebar {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: auto;
        max-height: 0;
        padding: 0 16px;
        overflow: hidden;
        border-right: none;
        border-bottom: 1px solid rgba(0, 212, 255, 0.15);
        transition: max-height 0.3s ease, padding 0.3s ease;
      }

      #sidebar.expanded {
        max-height: 70vh;
        padding: 24px 16px;
      }

      #menu-toggle {
        display: flex;
      }

      .tooltip {
        top: auto;
        bottom: 48px;
        right: 16px;
        left: 16px;
        max-width: none;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <button id="menu-toggle" aria-label="菜单">
      <span></span>
    </button>
    <aside id="sidebar">
      <div class="sidebar-title">分子模型库</div>
      <ul class="molecule-list" id="molecule-list"></ul>
    </aside>
    <main id="viewport">
      <div id="canvas-container"></div>
      <div class="tooltip">
        <strong>操作提示：</strong><br />
        拖拽旋转 · 滚轮缩放 · 点击2个原子测键长 · 点击3个原子测键角 · 拖拽原子调整位置
      </div>
      <div id="fps-counter">FPS: --</div>
    </main>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
