<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>壁画时光机 | Mural Time Machine</title>
  <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Serif+SC:wght@400;700&family=Cinzel:wght@400;600&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --paper-color: #f5e6c8;
      --paper-dark: #e8d4a8;
      --gold-color: #b8860b;
      --gold-light: #d4a84b;
      --ochre-color: #8b4513;
      --text-color: #3d2b1f;
      --glass-bg: rgba(245, 230, 200, 0.85);
    }

    body {
      font-family: 'Noto Serif SC', 'Cinzel', serif;
      background: var(--paper-color);
      color: var(--text-color);
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
    }

    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: 
        radial-gradient(ellipse at 20% 30%, rgba(139, 69, 19, 0.03) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 70%, rgba(184, 134, 11, 0.04) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    .app {
      position: relative;
      z-index: 1;
      max-width: 1200px;
      margin: 0 auto;
      padding: 30px 20px;
    }

    .header {
      text-align: center;
      margin-bottom: 30px;
    }

    .title {
      font-family: 'Ma Shan Zheng', 'Noto Serif SC', cursive;
      font-size: 3.5rem;
      color: var(--ochre-color);
      text-shadow: 2px 2px 4px rgba(139, 69, 19, 0.2);
      margin-bottom: 8px;
    }

    .subtitle {
      font-family: 'Cinzel', serif;
      font-size: 1rem;
      color: var(--gold-color);
      letter-spacing: 4px;
      text-transform: uppercase;
    }

    .controls {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 20px;
      margin-bottom: 30px;
      padding: 15px 30px;
      background: var(--glass-bg);
      backdrop-filter: blur(10px);
      border-radius: 12px;
      border: 1px solid rgba(184, 134, 11, 0.3);
      max-width: 500px;
      margin-left: auto;
      margin-right: auto;
    }

    .control-label {
      font-size: 0.9rem;
      color: var(--ochre-color);
      white-space: nowrap;
    }

    .tone-slider {
      flex: 1;
      -webkit-appearance: none;
      appearance: none;
      height: 6px;
      border-radius: 3px;
      background: linear-gradient(to right, #d4a84b, #4a90b8);
      outline: none;
      cursor: pointer;
    }

    .tone-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: var(--paper-color);
      border: 2px solid var(--gold-color);
      cursor: pointer;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.2);
    }

    .tone-slider::-moz-range-thumb {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: var(--paper-color);
      border: 2px solid var(--gold-color);
      cursor: pointer;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.2);
    }

    .main-canvas-container {
      position: relative;
      width: 100%;
      max-width: 800px;
      margin: 0 auto 30px;
      aspect-ratio: 4 / 3;
    }

    .main-canvas-wrapper {
      position: relative;
      width: 100%;
      height: 100%;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 
        0 10px 40px rgba(139, 69, 19, 0.3),
        0 0 0 1px rgba(184, 134, 11, 0.4),
        inset 0 0 60px rgba(139, 69, 19, 0.1);
      animation: paperShake 4s ease-in-out infinite;
    }

    @keyframes paperShake {
      0%, 100% { transform: rotate(-0.3deg); }
      50% { transform: rotate(0.3deg); }
    }

    .main-canvas {
      width: 100%;
      height: 100%;
      display: block;
      transition: opacity 0.6s ease-in-out;
    }

    .main-canvas.fading {
      opacity: 0;
    }

    .corner-decoration {
      position: absolute;
      width: 40px;
      height: 40px;
      pointer-events: none;
      opacity: 0.6;
    }

    .corner-decoration.top-left {
      top: 8px;
      left: 8px;
      border-top: 2px solid var(--gold-color);
      border-left: 2px solid var(--gold-color);
    }

    .corner-decoration.top-right {
      top: 8px;
      right: 8px;
      border-top: 2px solid var(--gold-color);
      border-right: 2px solid var(--gold-color);
    }

    .corner-decoration.bottom-left {
      bottom: 8px;
      left: 8px;
      border-bottom: 2px solid var(--gold-color);
      border-left: 2px solid var(--gold-color);
    }

    .corner-decoration.bottom-right {
      bottom: 8px;
      right: 8px;
      border-bottom: 2px solid var(--gold-color);
      border-right: 2px solid var(--gold-color);
    }

    .detail-panel {
      position: absolute;
      bottom: -80px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--glass-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-radius: 16px;
      padding: 20px 30px;
      border: 1px solid rgba(184, 134, 11, 0.4);
      box-shadow: 0 8px 32px rgba(139, 69, 19, 0.2);
      opacity: 0;
      pointer-events: none;
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      min-width: 300px;
      text-align: center;
      z-index: 10;
    }

    .detail-panel.visible {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .detail-title {
      font-family: 'Ma Shan Zheng', 'Noto Serif SC', cursive;
      font-size: 1.5rem;
      color: var(--ochre-color);
      margin-bottom: 4px;
    }

    .detail-era {
      font-family: 'Cinzel', serif;
      font-size: 0.85rem;
      color: var(--gold-color);
      margin-bottom: 10px;
      letter-spacing: 1px;
    }

    .detail-desc {
      font-size: 0.9rem;
      line-height: 1.6;
      color: var(--text-color);
      font-style: italic;
    }

    .thumbnail-section {
      position: relative;
      margin-top: 60px;
      padding: 20px 0;
    }

    .thumbnail-label {
      text-align: center;
      font-family: 'Cinzel', serif;
      font-size: 0.85rem;
      color: var(--gold-color);
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 15px;
    }

    .thumbnail-container {
      display: flex;
      gap: 16px;
      padding: 10px 20px;
      overflow-x: auto;
      scroll-behavior: smooth;
      scrollbar-width: thin;
      scrollbar-color: var(--gold-color) var(--paper-dark);
    }

    .thumbnail-container::-webkit-scrollbar {
      height: 6px;
    }

    .thumbnail-container::-webkit-scrollbar-track {
      background: var(--paper-dark);
      border-radius: 3px;
    }

    .thumbnail-container::-webkit-scrollbar-thumb {
      background: var(--gold-color);
      border-radius: 3px;
    }

    .thumbnail {
      position: relative;
      flex-shrink: 0;
      width: 120px;
      height: 90px;
      border-radius: 6px;
      overflow: hidden;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      border: 2px solid transparent;
      box-shadow: 0 2px 8px rgba(139, 69, 19, 0.2);
    }

    .thumbnail:hover {
      transform: translateY(-4px);
      box-shadow: 0 6px 16px rgba(139, 69, 19, 0.3);
    }

    .thumbnail.active {
      border-color: var(--gold-color);
      transform: translateY(-6px) scale(1.05);
    }

    .thumbnail.active::after {
      content: '';
      position: absolute;
      top: -4px;
      left: -4px;
      right: -4px;
      bottom: -4px;
      border-radius: 10px;
      border: 2px solid var(--gold-light);
      animation: pulseGlow 2s ease-in-out infinite;
      pointer-events: none;
    }

    @keyframes pulseGlow {
      0%, 100% {
        opacity: 0.5;
        box-shadow: 0 0 10px var(--gold-light), 0 0 20px rgba(212, 168, 75, 0.3);
      }
      50% {
        opacity: 1;
        box-shadow: 0 0 20px var(--gold-light), 0 0 40px rgba(212, 168, 75, 0.5);
      }
    }

    .thumbnail canvas {
      width: 100%;
      height: 100%;
      display: block;
    }

    .thumbnail-name {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 4px 8px;
      background: linear-gradient(transparent, rgba(61, 43, 31, 0.8));
      color: var(--paper-color);
      font-size: 0.75rem;
      text-align: center;
      transform: translateY(100%);
      transition: transform 0.3s ease;
    }

    .thumbnail:hover .thumbnail-name,
    .thumbnail.active .thumbnail-name {
      transform: translateY(0);
    }

    .scroll-hint {
      position: absolute;
      right: 0;
      top: 50%;
      transform: translateY(-50%);
      width: 30px;
      height: 60px;
      background: linear-gradient(to left, var(--paper-color), transparent);
      pointer-events: none;
    }

    .footer {
      text-align: center;
      margin-top: 40px;
      padding-top: 20px;
      border-top: 1px solid rgba(184, 134, 11, 0.3);
    }

    .footer-text {
      font-size: 0.8rem;
      color: var(--gold-color);
      font-family: 'Cinzel', serif;
      letter-spacing: 2px;
    }

    .hint-text {
      text-align: center;
      font-size: 0.85rem;
      color: var(--ochre-color);
      margin-top: 10px;
      font-style: italic;
      opacity: 0.8;
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="header">
      <h1 class="title">壁画时光机</h1>
      <p class="subtitle">Mural Time Machine</p>
    </header>

    <div class="controls">
      <span class="control-label">色调调节</span>
      <input type="range" class="tone-slider" id="toneSlider" min="0" max="100" value="0">
      <span class="control-label" id="toneLabel">暖黄</span>
    </div>

    <div class="main-canvas-container">
      <div class="main-canvas-wrapper">
        <canvas class="main-canvas" id="mainCanvas"></canvas>
        <div class="corner-decoration top-left"></div>
        <div class="corner-decoration top-right"></div>
        <div class="corner-decoration bottom-left"></div>
        <div class="corner-decoration bottom-right"></div>
      </div>
      <div class="detail-panel" id="detailPanel">
        <h3 class="detail-title" id="detailTitle">壁画名称</h3>
        <p class="detail-era" id="detailEra">年代</p>
        <p class="detail-desc" id="detailDesc">介绍文字</p>
      </div>
      <p class="hint-text">点击壁画体验碎片聚合动画 ✦ 滚动底部浏览更多</p>
    </div>

    <div class="thumbnail-section">
      <p class="thumbnail-label">— 画廊 Collection —</p>
      <div class="thumbnail-container" id="thumbnailContainer">
      </div>
    </div>

    <footer class="footer">
      <p class="footer-text">穿越时空 · 触摸文明 · 艺术永恒</p>
    </footer>
  </div>

  <svg style="position: absolute; width: 0; height: 0;">
    <defs>
      <filter id="paperWear" x="-20%" y="-20%" width="140%" height="140%">
        <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="5" result="noise"/>
        <feDisplacementMap in="SourceGraphic" in2="noise" scale="2" xChannelSelector="R" yChannelSelector="G"/>
      </filter>
    </defs>
  </svg>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
