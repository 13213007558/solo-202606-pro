<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>壁画时光机 | Mural Time Machine</title>
  <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Serif+SC:wght@400;700&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --paper-bg: #f5e6c8;
      --gold-dark: #8b6914;
      --gold-light: #d4af37;
      --ochre: #cc7722;
      --ink-dark: #2c1810;
      --glass-bg: rgba(245, 230, 200, 0.85);
    }

    body {
      font-family: 'Noto Serif SC', 'Playfair Display', serif;
      background: var(--paper-bg);
      color: var(--ink-dark);
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
    }

    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-image: 
        radial-gradient(ellipse at 20% 30%, rgba(139, 105, 20, 0.08) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 70%, rgba(204, 119, 34, 0.06) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    .paper-texture {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      opacity: 0.4;
      pointer-events: none;
      z-index: 1;
    }

    header {
      position: relative;
      z-index: 10;
      text-align: center;
      padding: 30px 20px 20px;
      border-bottom: 2px solid var(--gold-dark);
      background: linear-gradient(to bottom, rgba(245, 230, 200, 0.9), rgba(245, 230, 200, 0.7));
    }

    h1 {
      font-family: 'Ma Shan Zheng', cursive;
      font-size: 3rem;
      color: var(--ink-dark);
      margin-bottom: 8px;
      text-shadow: 2px 2px 4px rgba(139, 105, 20, 0.3);
    }

    .subtitle {
      font-family: 'Playfair Display', serif;
      font-size: 1.1rem;
      color: var(--gold-dark);
      font-style: italic;
    }

    .controls {
      position: relative;
      z-index: 10;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 30px;
      padding: 20px;
      background: rgba(245, 230, 200, 0.6);
      backdrop-filter: blur(5px);
    }

    .hue-control {
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .hue-control label {
      font-size: 0.95rem;
      color: var(--ink-dark);
      font-weight: 600;
    }

    .hue-slider {
      width: 280px;
      height: 8px;
      -webkit-appearance: none;
      appearance: none;
      background: linear-gradient(to right, #f5a623, #d4af37, #4a90a4, #2c5aa0);
      border-radius: 4px;
      outline: none;
      cursor: pointer;
      border: 1px solid var(--gold-dark);
    }

    .hue-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 24px;
      height: 24px;
      background: var(--paper-bg);
      border: 3px solid var(--gold-dark);
      border-radius: 50%;
      cursor: pointer;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.3);
      transition: transform 0.2s ease;
    }

    .hue-slider::-webkit-slider-thumb:hover {
      transform: scale(1.1);
    }

    .hue-slider::-moz-range-thumb {
      width: 24px;
      height: 24px;
      background: var(--paper-bg);
      border: 3px solid var(--gold-dark);
      border-radius: 50%;
      cursor: pointer;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.3);
    }

    main {
      position: relative;
      z-index: 5;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 30px 20px 220px;
      min-height: calc(100vh - 200px);
    }

    .main-canvas-container {
      position: relative;
      width: min(90%, 800px);
      aspect-ratio: 4 / 3;
      margin-bottom: 30px;
    }

    .main-card {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: var(--paper-bg);
      border: 3px solid var(--gold-dark);
      border-radius: 8px;
      box-shadow: 
        0 10px 40px rgba(44, 24, 16, 0.3),
        inset 0 0 60px rgba(139, 105, 20, 0.1);
      overflow: hidden;
      animation: paperShake 4s ease-in-out infinite;
      transform-origin: center center;
    }

    @keyframes paperShake {
      0%, 100% { transform: rotate(-0.3deg); }
      25% { transform: rotate(0.2deg); }
      50% { transform: rotate(0.4deg); }
      75% { transform: rotate(-0.1deg); }
    }

    .main-card::before,
    .main-card::after {
      content: '';
      position: absolute;
      width: 40px;
      height: 40px;
      pointer-events: none;
      z-index: 10;
    }

    .main-card::before {
      top: -2px;
      left: -2px;
      border-top: 4px solid var(--ochre);
      border-left: 4px solid var(--ochre);
      border-radius: 8px 0 0 0;
    }

    .main-card::after {
      bottom: -2px;
      right: -2px;
      border-bottom: 4px solid var(--ochre);
      border-right: 4px solid var(--ochre);
      border-radius: 0 0 8px 0;
    }

    .main-canvas {
      width: 100%;
      height: 100%;
      display: block;
      cursor: pointer;
      transition: opacity 0.6s ease;
    }

    .main-canvas.fading {
      opacity: 0;
    }

    .detail-panel {
      position: absolute;
      bottom: calc(100% + 20px);
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--glass-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(139, 105, 20, 0.4);
      border-radius: 12px;
      padding: 20px 30px;
      min-width: 320px;
      max-width: 90%;
      opacity: 0;
      visibility: hidden;
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 8px 32px rgba(44, 24, 16, 0.2);
    }

    .detail-panel.active {
      opacity: 1;
      visibility: visible;
      transform: translateX(-50%) translateY(0);
    }

    .detail-panel h2 {
      font-family: 'Ma Shan Zheng', cursive;
      font-size: 1.8rem;
      color: var(--ink-dark);
      margin-bottom: 8px;
      text-align: center;
    }

    .detail-panel .era {
      font-family: 'Playfair Display', serif;
      font-size: 1rem;
      color: var(--gold-dark);
      text-align: center;
      margin-bottom: 12px;
      font-style: italic;
    }

    .detail-panel .description {
      font-size: 0.9rem;
      line-height: 1.7;
      color: var(--ink-dark);
      text-align: justify;
    }

    .thumbnail-container {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 20;
      padding: 20px 40px;
      background: linear-gradient(to top, rgba(245, 230, 200, 0.98), rgba(245, 230, 200, 0.85));
      border-top: 2px solid var(--gold-dark);
      overflow-x: auto;
      overflow-y: hidden;
      scrollbar-width: thin;
      scrollbar-color: var(--gold-dark) transparent;
    }

    .thumbnail-container::-webkit-scrollbar {
      height: 6px;
    }

    .thumbnail-container::-webkit-scrollbar-track {
      background: transparent;
    }

    .thumbnail-container::-webkit-scrollbar-thumb {
      background: var(--gold-dark);
      border-radius: 3px;
    }

    .thumbnail-strip {
      display: flex;
      gap: 16px;
      padding: 10px 0;
      min-width: max-content;
    }

    .thumbnail {
      position: relative;
      width: 120px;
      height: 90px;
      flex-shrink: 0;
      cursor: pointer;
      border: 2px solid var(--gold-dark);
      border-radius: 6px;
      overflow: hidden;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      background: var(--paper-bg);
    }

    .thumbnail:hover {
      transform: translateY(-6px);
      box-shadow: 0 8px 20px rgba(44, 24, 16, 0.3);
    }

    .thumbnail.active {
      border-color: var(--gold-light);
      transform: translateY(-10px);
      box-shadow: 0 12px 28px rgba(44, 24, 16, 0.4);
    }

    .thumbnail.active::after {
      content: '';
      position: absolute;
      top: -4px;
      left: -4px;
      right: -4px;
      bottom: -4px;
      border: 2px solid var(--gold-light);
      border-radius: 8px;
      animation: pulseGlow 1.5s ease-in-out infinite;
      pointer-events: none;
    }

    @keyframes pulseGlow {
      0%, 100% { 
        opacity: 1; 
        box-shadow: 0 0 10px var(--gold-light), 0 0 20px var(--gold-light);
      }
      50% { 
        opacity: 0.6; 
        box-shadow: 0 0 20px var(--gold-light), 0 0 40px var(--gold-light);
      }
    }

    .thumbnail canvas {
      width: 100%;
      height: 100%;
      display: block;
    }

    .thumbnail .label {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 4px 8px;
      background: linear-gradient(to top, rgba(44, 24, 16, 0.9), transparent);
      color: var(--paper-bg);
      font-size: 0.7rem;
      text-align: center;
      font-family: 'Noto Serif SC', serif;
    }

    .worn-corners {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      filter: url(#wornFilter);
      opacity: 0.3;
    }

    svg.defs {
      position: absolute;
      width: 0;
      height: 0;
    }

    .click-hint {
      position: absolute;
      bottom: 15px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.85rem;
      color: var(--gold-dark);
      font-style: italic;
      opacity: 0.8;
      animation: fadePulse 2s ease-in-out infinite;
    }

    @keyframes fadePulse {
      0%, 100% { opacity: 0.5; }
      50% { opacity: 1; }
    }

    @media (max-width: 768px) {
      h1 { font-size: 2rem; }
      .hue-slider { width: 180px; }
      .thumbnail { width: 90px; height: 68px; }
      .detail-panel { min-width: 260px; padding: 15px 20px; }
    }
  </style>
</head>
<body>
  <svg class="defs">
    <defs>
      <filter id="wornFilter">
        <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="5" result="noise"/>
        <feDisplacementMap in="SourceGraphic" in2="noise" scale="3" xChannelSelector="R" yChannelSelector="G"/>
        <feColorMatrix type="saturate" values="0.8"/>
      </filter>
      <filter id="paperTexture">
        <feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="4" result="noise"/>
        <feColorMatrix type="matrix" values="
          1 0 0 0 0.85
          0 1 0 0 0.78
          0 0 1 0 0.6
          0 0 0 0.15 0
        "/>
        <feComposite in2="SourceGraphic" operator="in"/>
      </filter>
    </defs>
  </svg>

  <canvas class="paper-texture"></canvas>

  <header>
    <h1>壁画时光机</h1>
    <p class="subtitle">Mural Time Machine - A Journey Through Ancient Art</p>
  </header>

  <div class="controls">
    <div class="hue-control">
      <label for="hueSlider">色调调节</label>
      <input type="range" id="hueSlider" class="hue-slider" min="0" max="100" value="20">
    </div>
  </div>

  <main>
    <div class="main-canvas-container">
      <div class="detail-panel" id="detailPanel">
        <h2 id="muralTitle">壁画名称</h2>
        <p class="era" id="muralEra">年代</p>
        <p class="description" id="muralDesc">描述文字</p>
      </div>
      
      <div class="main-card">
        <canvas id="mainCanvas" class="main-canvas"></canvas>
        <canvas class="worn-corners"></canvas>
        <p class="click-hint">点击画面体验碎片聚合效果</p>
      </div>
    </div>
  </main>

  <div class="thumbnail-container" id="thumbnailContainer">
    <div class="thumbnail-strip" id="thumbnailStrip"></div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
